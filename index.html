<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>色付けエディタ</title>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        padding: 15px;
        max-width: 600px;
        margin: auto;
        background-color: #f4f5f7;
        color: #333;
    }
    h2 {
        font-size: 18px;
        text-align: center;
        margin-bottom: 20px;
    }
    .step-title {
        font-size: 14px;
        font-weight: bold;
        margin: 15px 0 5px 0;
        color: #555;
    }
    textarea, .editor {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px; 
        line-height: 1.6;
    }
    textarea {
        min-height: 120px;
        resize: vertical;
        background-color: #fff;
    }
    .editor {
        min-height: 150px;
        background-color: #000;
        color: #fff;
        border: 2px solid #555;
    }
    .editor p {
        margin: 0 0 10px 0;
    }
    .btn {
        display: block;
        width: 100%;
        padding: 14px;
        font-size: 16px;
        font-weight: bold;
        text-align: center;
        color: #fff;
        background-color: #333;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        touch-action: manipulation;
        margin-bottom: 15px;
    }
    .btn-primary { background-color: #00b050; }
    .btn-copy { background-color: #0070c0; }
    .btn:active { opacity: 0.8; }
    
    .color-palette {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 15px;
    }
    .color-btn {
        width: calc(25% - 8px); 
        aspect-ratio: 1 / 1;
        border-radius: 50%;
        border: 2px solid #444;
        cursor: pointer;
        box-sizing: border-box;
        box-shadow: 0 2px 4px rgba(0,0px,0,0.3);
    }
</style>
</head>
<body>

    <h2>色付けエディタ</h2>

    <div class="step-title">1. 元の文章を貼り付け</div>
    <textarea id="rawText" placeholder="ここに文章を入力、または貼り付けてください..."></textarea>
    <button class="btn btn-primary" onclick="initEditor()">歌詞を読み込む</button>

    <div class="step-title">2. 文字を選択して色をつける</div>
    <div class="color-palette" id="palette"></div>

    <div id="editor" class="editor" contenteditable="true" placeholder="ここにプレビューが表示されます。"></div>

    <div class="step-title">3. 完成したHTML</div>
    <textarea id="outputHTML" readonly placeholder="ここにHTMLが出力されます..."></textarea>
    <button class="btn btn-copy" onclick="copyHTML()">HTMLをコピーする</button>

<script>
    // 指定されたメンバーカラー8色を設定
    const colors = [
        { hex: '#a54cff' },
        { hex: '#00b050' },
        { hex: '#7fd7ff' },
        { hex: '#ff0000' },
        { hex: '#5aff19' },
        { hex: '#aaaaaa' },
        { hex: '#ff8f1c' },
        { hex: '#f3cfb3' }
    ];

    const palette = document.getElementById('palette');
    colors.forEach(colorInfo => {
        const btn = document.createElement('div');
        btn.className = 'color-btn';
        btn.style.backgroundColor = colorInfo.hex;
        
        // 【修正ポイント】タッチした瞬間に直接色付けを実行するように変更
        const applyHandler = (e) => {
            e.preventDefault(); // 選択範囲が消えるのを防ぐ
            applyColor(colorInfo.hex);
        };
        
        // PCのクリック用とスマホのタッチ用、両方に対応
        btn.addEventListener('mousedown', applyHandler);
        btn.addEventListener('touchstart', applyHandler, { passive: false });
        
        palette.appendChild(btn);
    });

    function initEditor() {
        const rawText = document.getElementById('rawText').value;
        if (!rawText) return;

        const lines = rawText.split('\n');
        const htmlLines = lines.map(line => {
            const content = line.trim() === '' ? '<br>' : line;
            return `<p>${content}</p>`;
        });

        document.getElementById('editor').innerHTML = htmlLines.join('\n');
        updateHTML();
    }

    function applyColor(hexColor) {
        const selection = window.getSelection();
        if (!selection.rangeCount || selection.isCollapsed) {
            alert("色をつけたい文字を指で選択してから、色ボタンを押してください。");
            return;
        }

        // 【修正ポイント】ブラウザ標準の装飾機能（execCommand）を使用
        // これにより、複数行にまたがる選択などでもエラーにならず綺麗に色がつきます
        document.execCommand('foreColor', false, hexColor);
        updateHTML();
    }

    document.getElementById('editor').addEventListener('input', updateHTML);

    function updateHTML() {
        let html = document.getElementById('editor').innerHTML;
        
        html = html.replace(/color:\s*rgb\((\d+),\s*(\d+),\s*(\d+)\);?/gi, function(match, r, g, b) {
            function toHex(x) {
                const hex = parseInt(x).toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }
            return 'color:#' + toHex(r) + toHex(g) + toHex(b) + ';';
        });

        document.getElementById('outputHTML').value = html;
    }

    function copyHTML() {
        const output = document.getElementById('outputHTML');
        if (!output.value) {
            alert("コピーするHTMLがありません。");
            return;
        }
        
        output.select();
        output.setSelectionRange(0, 99999);
        
        navigator.clipboard.writeText(output.value).then(() => {
            alert("コピー完了！");
        }).catch(err => {
            alert("コピーに失敗しました。お手数ですが手動でコピーしてください。");
        });
    }
</script>
</body>
</html>
